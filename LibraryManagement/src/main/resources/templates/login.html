<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Library</title>
    <link rel="stylesheet" href="/assets/app.css">
</head>
<body>
<div class="page-shell login-card">
    <div class="panel">
        <div class="hero">
            <div class="hero-copy">
                <div class="eyebrow">Library management</div>
                <h1>Login</h1>
                <p>Session-based login. You’ll be redirected based on your role.</p>
                <p class="pill">Defaults: admin@library.com / admin123, student@library.com / student123</p>
            </div>
        </div>

        <div id="msg" class="message"></div>

        <form id="loginForm">
            <label>
                Email
                <input name="email" type="email" required value="admin@library.com"/>
            </label>
            <label>
                Password
                <input name="password" type="password" required value="admin123"/>
            </label>
            <div class="toolbar-actions">
                <button type="submit">Login</button>
                <button class="secondary" type="button" id="useStudent">Use student</button>
                <button class="secondary" type="button" onclick="window.location.href='/'">Home</button>
            </div>
        </form>
    </div>
</div>

<script src="/assets/app.js"></script>
<script>
  window.LibraryUI.initLoginPage();
</script>
</body>
</html>
